<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mousy Studios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23f5f5f5" width="100" height="100"/><path d="M-2 0h4v4h-4zM0 2v-4h4v4z" fill="%23e8e8e8"/></svg>');
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        h1 {
            margin: 0 0 30px 0;
            font-size: 3em;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .title-text {
            display: inline-block;
            margin-bottom: 20px;
            position: relative;
        }

        .word-mousy {
            color: #ff6b6b;
            font-size: 2.5em;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(255, 107, 107, 0.3);
            margin-right: 15px;
            animation: bounce 2s ease-in-out infinite;
        }

        .word-studios {
            color: #4ecdc4;
            font-size: 2.5em;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(78, 205, 196, 0.3);
            animation: bounce 2s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .links-container {
            margin: 30px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-link {
            margin: 10px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .game-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .game-link:hover::before {
            left: 100%;
        }

        .game-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .image-button {
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
            display: inline-block;
            margin-top: 20px;
        }

        .image-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
        }

        .image-button img {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .image-button:hover img {
            transform: scale(1.05);
        }

        p {
            margin: 20px 0;
            color: #666;
            font-size: 1.1em;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="title-text">
                <span class="word-mousy">Mousy</span>
                <span class="word-studios">Studios</span>
            </span>
        </h1>
        
        <div class="links-container">
            <a href="https://www.roblox.com/games/108065360611895/How-many-ways-can-you-reset-in-this-game" 
               class="game-link" target="_blank">
                How many ways can you reset in this game?
            </a>
            <a href="https://www.roblox.com/games/71683705330898/Untitled-Minigames?" 
               class="game-link" target="_blank">
                Untitled Minigames
            </a>
        </div>

        <p>Click a button to play</p>
        <a href="https://www.roblox.com/games/108065360611895/How-many-ways-can-you-reset-in-this-game" target="_blank">
            <button class="image-button">
                <img src="https://via.placeholder.com/200" alt="Play Now">
            </button>
        </a>
    </div>
</body>
</html>
