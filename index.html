<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23f5f5f5" width="100" height="100"/><path d="M-2 0h4v4h-4zM0 2v-4h4v4z" fill="%23e8e8e8"/></svg>');
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .image-button {
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
            background: none;
            padding: 0;
        }

        .image-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Site</h1>
        <p>Click the button below to visit the safe website</p>
        <a href="https://example.com" target="_blank">
            <button class="image-button">
                <img src="https://via.placeholder.com/200" alt="Visit Site" width="200">
            </button>
        </a>
    </div>
</body>
</html>
