<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mousy Studios</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23f5f5f5" width="100" height="100"/><path d="M-2 0h4v4h-4zM0 2v-4h4v4z" fill="%23e8e8e8"/></svg>');
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
        }

        .title-text {
            display: inline-block;
            margin-bottom: 20px;
        }

        .word-mousy {
            color: white;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-right: 10px;
            font-size: 2em;
        }

        .word-studios {
            color: #0066cc;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            font-size: 2em;
        }

        .image-button {
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
            background: none;
            padding: 0;
        }

        .image-button:hover {
            transform: scale(1.05);
        }

        .links-container {
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .game-link {
            margin: 10px;
            padding: 15px 25px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .game-link:hover {
            background: #004499;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="title-text">
                <span class="word-mousy">Mousy</span>
                <span class="word-studios">Studios</span>
            </span>
        </h1>
        
        <div class="links-container">
            <a href="https://www.roblox.com/games/108065360611895/How-many-ways-can-you-reset-in-this-game" 
               class="game-link" target="_blank">
                How many ways can you reset in this game?
            </a>
            <a href="https://www.roblox.com/games/71683705330898/Untitled-Minigames?" 
               class="game-link" target="_blank">
                Untitled Minigames
            </a>
        </div>

        <p style="margin-top: 30px;">Click a button to play</p>
        <a href="https://www.roblox.com/games/108065360611895/How-many-ways-can-you-reset-in-this-game" target="_blank">
            <button class="image-button">
                <img src="https://via.placeholder.com/200" alt="Play Now" width="200">
            </button>
        </a>
    </div>
</body>
</html>
